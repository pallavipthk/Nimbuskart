name: Cost Janitor

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  cost-janitor:
    name: Scan for orphaned AWS resources
    runs-on: ubuntu-latest

    # LocalStack runs as a sidecar container. Port 4566 is forwarded to the runner.
    services:
      localstack:
        image: localstack/localstack:3.8
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,s3,iam,sts
          DEBUG: 0
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s

    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LOCALSTACK_HOSTNAME: localhost
      TF_VAR_localstack_endpoint: http://localhost:4566

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────────────────

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: janitor/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install terraform-local awscli-local
          pip install -r janitor/requirements.txt

      # ── Terraform setup ─────────────────────────────────────────────────────

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      # ── Wait for LocalStack ─────────────────────────────────────────────────
      # The service-container health check may still be running; this step is
      # a belt-and-suspenders wait so Terraform doesn't fire too early.

      - name: Wait for LocalStack to be healthy
        run: |
          echo "Waiting for LocalStack health endpoint…"
          for i in $(seq 1 40); do
            if curl -sf http://localhost:4566/_localstack/health > /dev/null; then
              echo "LocalStack ready after ${i} checks."
              break
            fi
            [ "$i" -eq 40 ] && { echo "::error::LocalStack did not start in time."; exit 1; }
            sleep 3
          done

      # ── Terraform ───────────────────────────────────────────────────────────

      - name: Terraform Init
        working-directory: terraform
        run: tflocal init -input=false

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform
        run: tflocal validate

      - name: Terraform Apply
        working-directory: terraform
        run: tflocal apply -auto-approve -input=false

      # ── Unit tests ──────────────────────────────────────────────────────────

      - name: Run Janitor unit tests
        working-directory: janitor
        run: pytest tests/ -v --tb=short

      # ── Cost Janitor scan ───────────────────────────────────────────────────
      # continue-on-error is required because the script exits 1 when orphans
      # are found in --dry-run mode. We still want to upload artifacts and
      # post the PR comment before surfacing the failure.

      - name: Run Cost Janitor (dry-run)
        id: janitor
        working-directory: janitor
        run: |
          python janitor.py \
            --dry-run \
            --endpoint-url http://localhost:4566 \
            --region us-east-1 \
            --output-dir output
        continue-on-error: true

      # ── Artifacts ───────────────────────────────────────────────────────────

      - name: Upload janitor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: janitor-report-${{ github.sha }}
          path: |
            janitor/output/report.json
            janitor/output/report.md
          if-no-files-found: warn

      # ── PR Comment ──────────────────────────────────────────────────────────

      - name: Post findings comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const jsonPath = 'janitor/output/report.json';
            const mdPath   = 'janitor/output/report.md';

            if (!fs.existsSync(jsonPath)) {
              console.log('No report.json found; skipping comment.');
              return;
            }

            const report = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            if (report.summary.total_orphans === 0) {
              console.log('No orphans — no comment needed.');
              return;
            }

            const mdContent = fs.existsSync(mdPath)
              ? fs.readFileSync(mdPath, 'utf8')
              : `**${report.summary.total_orphans} orphan(s) found — see report artifact for details.**`;

            const MARKER = '<!-- cost-janitor-report -->';
            const body = `${MARKER}\n${mdContent}\n\n---\n*Posted automatically by Cost Janitor CI*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing Cost Janitor comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Posted new Cost Janitor comment.');
            }

      # ── Final gate ──────────────────────────────────────────────────────────
      # Fail the workflow only after artifacts are uploaded and the PR comment
      # has been posted, so reviewers always have the full report.

      - name: Fail workflow if orphans were detected
        if: steps.janitor.outcome == 'failure'
        run: |
          echo "::error::Cost Janitor found orphaned resources. See the report artifact for details."
          exit 1
